site_name: OpenClaw Getting Started
site_description: Getting started guide for OpenClaw — setup, configuration, and optimization.
site_url: https://www.finnpedersenfrance.com/OpenClawGettingStarted/

repo_name: finnpedersenkazes/OpenClawGettingStarted
repo_url: https://github.com/finnpedersenkazes/OpenClawGettingStarted

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Hosts:
      - Ubuntu: Hosts/Ubuntu.md
      - macOS: Hosts/MacOS.md
      - Virtual Ubuntu: Hosts/VirtualUbuntu.md
      - Hostinger VPS: Hosts/Hostinger.md
      - NVIDIA Brev: Hosts/BrevNVIDIA.md
      - Raspberry Pi: Hosts/RaspberryPi.md
  - OpenClaw:
      - Prerequisites: OpenClaw/PreInstallation.md
      - Installation: OpenClaw/Installation.md
  - NemoClaw:
      - Prerequisites: NemoClaw/PreInstallation.md
      - Installation: NemoClaw/Installation.md
  - After Installation:
      - AI Models: Models.md
      - Onboarding: Onboarding.md
      - Skills: Skills.md
      - Identities: Identities.md
      - Security: Security.md
      - Tools: Tools.md
      - Costs: TokenOptimizationGuide.md
      - Dictionary: Dictonary.md
